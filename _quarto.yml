project:
  type: website
  output-dir: docs
  pre-render: _pre-render.R

website:
  title: "Lukas Röseler"
  navbar:
    background: "#03a1fc"
    foreground: "#0a1628"
    left:
      - href: index.qmd
        text: Home
      - research.qmd
      - openscience.qmd
      - collaborate.qmd
    right:
      - icon: github
        href: https://github.com/lukasroeseler
        aria-label: GitHub
  page-footer:
    right: "Built with [Quarto](https://quarto.org/)."
    left: "&copy; 2026, Lukas Röseler"

format:
  html:
    theme:
      light: [litera, custom.scss]
      dark:  [darkly, custom.scss]
    fontsize: 1.05em
    linestretch: 1.65
    toc: false
    mainfont: "DM Sans, Outfit, system-ui, sans-serif"
    include-in-header: _include-header.html

editor: source